name: Generate JSON Schema

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  generate-and-upload-schema:
    name: Generate and Upload Rules JSON Schema
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: uv sync --locked

      - name: Generate JSON Schema for Rules
        id: generate_schema
        run: uv run python -m radiko_timeshift_recorder gen-json-schema-for-rules > rules.schema.json

      - name: Upload JSON Schema to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.event.release.tag_name }} rules.schema.json --clobber
